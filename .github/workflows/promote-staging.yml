name: Promote to Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: true

  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    environment:
      name: staging

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set image tag
        run: |
          echo "TAG=${{ inputs.image_tag || github.event.inputs.image_tag }}" >> $GITHUB_ENV

      - name: Update Helm values for staging
        run: |
          sed -i "s/tag:.*/tag: $TAG/" helm/fastapi/values-staging.yaml

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add helm/fastapi/values-staging.yaml
          git commit -m "Promote to staging: $TAG" || echo "No changes"

          git pull origin main --rebase
          git push origin main