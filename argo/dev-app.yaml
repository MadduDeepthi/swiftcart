apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-dev
  namespace: argocd   
spec:
  project: default

  source:
    repoURL: https://github.com/MadduDeepthi/swiftcart.git
    targetRevision: main
    path: helm/fastapi
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true