apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: swiftcart
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/MadduDeepthi/swiftcart.git
    targetRevision: HEAD
    path: helm/fastapi
    helm: {} 
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true